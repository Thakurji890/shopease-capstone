<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Contact ShopEase - We'd love to hear from you!">
  <title>ShopEase | Contact</title>
  <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <script src="js/components.js" data-page="contact"></script>

  <main>

    <section class="page-header">
      <div class="container">
        <h1>📞 Contact Us</h1>
        <p>We'd love to hear from you!</p>
      </div>
    </section>

    <section class="contact-section">
      <div class="container">
        <div class="contact-wrapper">

          <aside class="contact-info" aria-label="Contact Information">
            <h2>Get in Touch</h2>
            <p>Have questions? We're here to help 24/7.</p>
            <div class="info-item">
              <span class="info-icon">📍</span>
              <div><h4>Address</h4><p>123 Shop Street, Digital City, 45678</p></div>
            </div>
            <div class="info-item">
              <span class="info-icon">📧</span>
              <div><h4>Email</h4><p>support@shopease.com</p></div>
            </div>
            <div class="info-item">
              <span class="info-icon">📱</span>
              <div><h4>Phone</h4><p>+1 (555) 123-4567</p></div>
            </div>
          </aside>

          <div class="contact-form-wrapper">
            <h2>Send us a Message</h2>
            <form id="contactForm" class="contact-form" novalidate>
              <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
                <small class="error-msg"></small>
              </div>
              <div class="form-group">
                <label for="contactEmail">Email *</label>
                <input type="email" id="contactEmail" name="email" required>
                <small class="error-msg"></small>
              </div>
              <div class="form-group">
                <label for="subject">Subject *</label>
                <input type="text" id="subject" name="subject" required>
                <small class="error-msg"></small>
              </div>
              <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                <small class="error-msg"></small>
              </div>
              <button type="submit" class="btn btn-primary btn-block">Send Message ✈️</button>
            </form>
            <p id="successMsg" class="success-msg" hidden>✅ Message sent successfully!</p>
          </div>

        </div>
      </div>
    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
