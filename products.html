<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Browse all products at ShopEase - Amazing deals waiting for you!">
  <title>ShopEase | Products</title>
  <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main>

    <section class="page-header">
      <div class="container">
        <h1>🛍️ All Products</h1>
        <p>Explore our entire collection</p>
      </div>
    </section>

    <!-- Filters & Search -->
    <section class="filters-section">
      <div class="container">
        <div class="filters">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search products..." aria-label="Search products">
          </div>
          <div class="filter-group">
            <label for="categoryFilter">Category:</label>
            <select id="categoryFilter" aria-label="Filter by category">
              <option value="all">All</option>
              <option value="electronics">Electronics</option>
              <option value="fashion">Fashion</option>
              <option value="home">Home</option>
              <option value="books">Books</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="sortFilter">Sort By:</label>
            <select id="sortFilter" aria-label="Sort products">
              <option value="default">Default</option>
              <option value="low-high">Price: Low → High</option>
              <option value="high-low">Price: High → Low</option>
              <option value="name">Name (A-Z)</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Products Grid -->
    <section class="products-section">
      <div class="container">
        <div class="products-grid" id="productsGrid"></div>
        <p id="noResults" class="no-results" hidden>😔 No products found. Try different keywords.</p>
      </div>
    </section>

  </main>

  <!-- Product Detail Modal -->
  <div class="modal product-modal" id="productModal" hidden>
    <div class="modal-content product-modal-content">
      <button class="modal-close" aria-label="Close modal">✕</button>
      <div class="product-modal-body" id="productModalBody"></div>
    </div>
  </div>

  <script src="js/components.js" data-page="products"></script>
  <script src="js/products.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
